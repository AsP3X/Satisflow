<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Satisfactory · Production Flow Designer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<header>
  <div class="logo">Satisfactory Production Designer</div>
  <div class="controls">
    <button id="theme-toggle" title="Toggle theme" aria-label="Toggle dark/light theme"><i class="fas fa-moon"></i></button>
    <button id="calc-btn">Calculate</button>
    <button id="export-btn">Export</button>
    <button id="import-btn">Import</button>
  </div>
</header>
<input type="file" id="import-file-input" accept=".json,application/json" style="display: none" />

<div id="main">
  <aside id="node-storage-sidebar">
    <h3 class="node-storage-title">Nodes</h3>
    <div id="node-storage-list"></div>
  </aside>
  <div id="canvas-wrapper">
    <div id="canvas">
      <svg id="svg-container"></svg>
    </div>

    <div id="zoom-controls">
      <button id="zoom-in" title="Zoom in" aria-label="Zoom in">+</button>
      <button id="zoom-out" title="Zoom out" aria-label="Zoom out">-</button>
      <button id="zoom-reset" title="Reset zoom" aria-label="Reset zoom to 1:1">1:1</button>
      <button id="zoom-fit" title="Fit all" aria-label="Zoom to fit all nodes">Fit</button>
      <button id="zoom-selection" title="Zoom selection" aria-label="Zoom to selected nodes">Sel</button>
    </div>
  </div>
</div>

<div id="node-context-menu" class="ctx-menu">
  <button type="button" class="ctx-item" data-action="edit"><i class="fas fa-pen"></i> Edit</button>
  <button type="button" class="ctx-item" data-action="clear"><i class="fas fa-unlink"></i> Clear Connections</button>
  <button type="button" class="ctx-item delete" data-action="delete"><i class="fas fa-trash"></i> Delete</button>
</div>

<div id="canvas-rightclick-menu" class="ctx-menu" aria-label="Canvas menu">
  <button type="button" class="ctx-item" data-action="node-window"><i class="fas fa-plus-square"></i> Node Window</button>
</div>

<div id="canvas-context-menu" class="ctx-menu" aria-label="Add building">
  <div id="canvas-context-menu-header" class="ctx-menu-header">
    <span class="ctx-menu-title">Add building</span>
    <input type="text" id="canvas-context-menu-search" class="ctx-menu-search" placeholder="Search..." autocomplete="off" />
    <button type="button" id="canvas-context-menu-close" class="ctx-menu-close" title="Close" aria-label="Close"><i class="fas fa-times"></i></button>
  </div>
  <div class="ctx-menu-body">
    <div id="canvas-context-menu-categories" class="ctx-menu-categories"></div>
    <div id="canvas-context-menu-items" class="ctx-menu-items"></div>
  </div>
  <div id="canvas-context-menu-resize" class="ctx-menu-resize" aria-label="Resize"></div>
</div>

<div id="edit-dialog-overlay">
  <div id="edit-dialog">
    <h3>Edit building</h3>
    <label for="edit-dialog-name">Name</label>
    <input type="text" id="edit-dialog-name" placeholder="Building name" />
    <label for="edit-dialog-production">Production</label>
    <select id="edit-dialog-production"></select>
    <div id="edit-dialog-recipe-inputs" class="edit-dialog-recipe-inputs" aria-live="polite"></div>
    <label for="edit-dialog-rate">Rate (/ min)</label>
    <input type="text" id="edit-dialog-rate" inputmode="decimal" placeholder="0" />
    <div id="edit-dialog-ore-quality-wrap" class="edit-dialog-miner-only" style="display: none;">
      <label for="edit-dialog-ore-quality">Ore node quality</label>
      <select id="edit-dialog-ore-quality"></select>
    </div>
    <div id="edit-dialog-actions">
      <button type="button" id="edit-dialog-cancel">Cancel</button>
      <button type="button" id="edit-dialog-save">Save</button>
    </div>
  </div>
</div>

<div id="add-node-dialog-overlay">
  <div id="add-node-dialog" class="add-node-dialog-card">
    <div class="add-node-dialog-header">
      <span class="add-node-dialog-icon" aria-hidden="true">⊕</span>
      <div class="add-node-dialog-header-text">
        <h3 id="add-node-dialog-title">Add building</h3>
        <p id="add-node-dialog-hint" class="add-node-dialog-hint">Choose a building to place here.</p>
      </div>
    </div>
    <div id="add-node-dialog-list" class="add-node-dialog-list"></div>
    <div class="add-node-dialog-actions">
      <button type="button" id="add-node-dialog-cancel" class="add-node-dialog-cancel">Cancel</button>
    </div>
  </div>
</div>

<div id="toast" role="status" aria-live="polite"></div>
<script src="script.js"></script>
</body>
</html>
